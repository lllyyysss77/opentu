    <style>
      :root {
        --app-boot-bg: radial-gradient(
            circle at top,
            rgba(90, 79, 207, 0.14),
            transparent 38%
          ),
          linear-gradient(180deg, #fff8ef 0%, #ffffff 58%, #f8f9ff 100%);
        --app-boot-text: #2d3436;
        --app-boot-muted: #636e72;
        --app-boot-accent: #f39c12;
        --app-boot-accent-soft: rgba(243, 156, 18, 0.14);
        --app-boot-shadow: 0 20px 60px rgba(45, 52, 54, 0.08);
      }

      #app-boot-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--app-boot-bg);
        transition: opacity 0.28s ease, visibility 0.28s ease;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #app-boot-loading.is-visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      #app-boot-loading.is-leaving {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-boot-card {
        width: min(420px, calc(100vw - 48px));
        padding: 28px 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.72);
        box-shadow: var(--app-boot-shadow);
        backdrop-filter: blur(14px);
        text-align: center;
      }

      .app-boot-mark {
        min-width: 52px;
        height: 52px;
        padding: 0 16px;
        margin: 0 auto 16px;
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          rgba(243, 156, 18, 0.18),
          rgba(90, 79, 207, 0.12)
        );
        color: var(--app-boot-accent);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .app-boot-title {
        margin: 0;
        color: var(--app-boot-text);
        font-size: 18px;
        font-weight: 600;
        line-height: 1.4;
      }

      .app-boot-tip {
        margin: 10px 0 0;
        color: var(--app-boot-muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .app-boot-progress {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 18px;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--app-boot-accent-soft);
        color: var(--app-boot-accent);
        font-size: 13px;
        font-weight: 600;
      }

      .app-boot-progress-track {
        position: relative;
        width: min(180px, 42vw);
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(243, 156, 18, 0.16);
      }

      .app-boot-progress-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          rgba(243, 156, 18, 0.72),
          rgba(243, 156, 18, 1)
        );
        box-shadow: 0 0 16px rgba(243, 156, 18, 0.3);
        transition: width 0.24s ease;
      }

      .app-boot-progress-value {
        min-width: 44px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .app-boot-note {
        margin-top: 14px;
        color: rgba(99, 110, 114, 0.84);
        font-size: 12px;
        line-height: 1.5;
      }

      html.app-boot-error .app-boot-progress {
        background: rgba(233, 30, 99, 0.1);
        color: #e91e63;
      }

      html.app-boot-error .app-boot-progress-track {
        background: rgba(233, 30, 99, 0.16);
      }

      html.app-boot-error .app-boot-progress-fill {
        background: linear-gradient(
          90deg,
          rgba(233, 30, 99, 0.72),
          rgba(233, 30, 99, 1)
        );
        box-shadow: 0 0 16px rgba(233, 30, 99, 0.22);
      }

      @media (max-width: 640px) {
        .app-boot-card {
          padding: 24px 20px;
          border-radius: 20px;
        }
      }
    </style>
    <script>
      (function () {
        var bootReady = false;
        var bootProgress = 0;
        var hasSWProgress = false;
        var simulationStartAt = Date.now();
        var simulationTimer = 0;
        var showDelayTimer = window.setTimeout(function () {
          var bootRoot = getBootRoot();
          if (bootRoot && !bootReady) {
            bootRoot.classList.add('is-visible');
          }
        }, 360);
        var slowTipTimer = window.setTimeout(function () {
          var tip = document.querySelector('[data-app-boot-tip]');
          if (tip) {
            tip.textContent =
              '首次打开或网络较慢时会多等一会，正在努力准备中...';
          }
        }, 4000);
        var removeTimer = 0;

        function clearBootTimers() {
          if (showDelayTimer) {
            window.clearTimeout(showDelayTimer);
            showDelayTimer = 0;
          }
          if (slowTipTimer) {
            window.clearTimeout(slowTipTimer);
            slowTipTimer = 0;
          }
          if (removeTimer) {
            window.clearTimeout(removeTimer);
            removeTimer = 0;
          }
          if (simulationTimer) {
            window.clearInterval(simulationTimer);
            simulationTimer = 0;
          }
        }

        function getBootRoot() {
          return document.getElementById('app-boot-loading');
        }

        function clampProgress(value) {
          if (!isFinite(value)) {
            return bootProgress;
          }
          return Math.max(0, Math.min(100, value));
        }

        function renderProgress() {
          var progressRoot = document.querySelector(
            '[data-app-boot-progress]'
          );
          var progressFill = document.querySelector(
            '[data-app-boot-progress-fill]'
          );
          var progressValue = document.querySelector(
            '[data-app-boot-progress-value]'
          );
          var safeProgress = Math.round(clampProgress(bootProgress));

          if (progressRoot) {
            progressRoot.setAttribute('aria-valuenow', String(safeProgress));
          }
          if (progressFill) {
            progressFill.style.width = safeProgress + '%';
          }
          if (progressValue) {
            progressValue.textContent = safeProgress + '%';
          }
        }

        function startSimulatedProgress() {
          if (simulationTimer) {
            return;
          }

          simulationTimer = window.setInterval(function () {
            if (bootReady || hasSWProgress) {
              window.clearInterval(simulationTimer);
              simulationTimer = 0;
              return;
            }

            var elapsed = Date.now() - simulationStartAt;
            var simulatedProgress = Math.min(50, (elapsed / 2000) * 50);
            if (simulatedProgress > bootProgress) {
              bootProgress = simulatedProgress;
              renderProgress();
            }

            if (simulatedProgress >= 50) {
              window.clearInterval(simulationTimer);
              simulationTimer = 0;
            }
          }, 60);
        }

        function setProgress(value, options) {
          if (bootReady) {
            return;
          }

          if (options && options.source === 'sw') {
            hasSWProgress = true;
            if (simulationTimer) {
              window.clearInterval(simulationTimer);
              simulationTimer = 0;
            }
          }

          if (typeof value === 'number' && isFinite(value)) {
            bootProgress = Math.max(bootProgress, clampProgress(value));
          }

          var title = document.querySelector('[data-app-boot-title]');
          var tip = document.querySelector('[data-app-boot-tip]');
          var note = document.querySelector('[data-app-boot-note]');

          if (options && typeof options.title === 'string' && title) {
            title.textContent = options.title;
          }
          if (options && typeof options.tip === 'string' && tip) {
            tip.textContent = options.tip;
          }
          if (options && typeof options.note === 'string' && note) {
            note.textContent = options.note;
          }

          renderProgress();
        }

        function markReady() {
          if (bootReady) {
            return;
          }
          setProgress(100, {
            tip: '启动完成，正在进入工作台...',
          });
          bootReady = true;
          clearBootTimers();
          var bootRoot = getBootRoot();
          if (!bootRoot) {
            return;
          }
          bootRoot.classList.add('is-leaving');
          var removeBootRoot = function () {
            if (bootRoot.parentNode) {
              bootRoot.parentNode.removeChild(bootRoot);
            }
          };
          bootRoot.addEventListener('transitionend', removeBootRoot, {
            once: true,
          });
          removeTimer = window.setTimeout(removeBootRoot, 360);
        }

        function markError(message) {
          if (bootReady) {
            return;
          }
          setProgress(100);
          clearBootTimers();
          var bootRoot = getBootRoot();
          if (bootRoot) {
            bootRoot.classList.add('is-visible');
          }
          document.documentElement.classList.add('app-boot-error');
          var title = document.querySelector('[data-app-boot-title]');
          var tip = document.querySelector('[data-app-boot-tip]');
          if (title) {
            title.textContent = '启动中遇到问题';
          }
          if (tip) {
            tip.textContent = message || '资源加载失败，请刷新页面后重试。';
          }
        }

        window.__OPENTU_BOOT__ = {
          markReady: markReady,
          markError: markError,
          setProgress: setProgress,
        };

        renderProgress();
        startSimulatedProgress();

        window.addEventListener(
          'error',
          function (event) {
            var target = event && event.target;
            if (
              target &&
              target !== window &&
              (target.src || target.href)
            ) {
              var resourceUrl = target.src || target.href || '';
              var resourceName = resourceUrl.split('/').pop() || '资源文件';
              markError(resourceName + ' 加载失败，请刷新页面后重试。');
              return;
            }

            var message =
              event && typeof event.message === 'string' && event.message.trim()
                ? event.message.trim()
                : '启动脚本执行失败，请刷新页面后重试。';
            markError(message);
          },
          { once: true }
        );

        window.addEventListener(
          'unhandledrejection',
          function (event) {
            var reason = event && event.reason;
            var message =
              reason && typeof reason.message === 'string'
                ? reason.message
                : typeof reason === 'string'
                  ? reason
                  : '启动过程中发生异常，请刷新页面后重试。';
            markError(message);
          },
          { once: true }
        );
      })();
    </script>
